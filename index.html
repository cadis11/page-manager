<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram Page Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f0f;--bg2:#1a1a1a;--bg3:#242424;--bg4:#2e2e2e;
  --text:#f5f5f5;--text2:#a0a0a0;--text3:#606060;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);
  --pink:#e1306c;--pink2:#c13584;--pink-glow:rgba(225,48,108,0.18);
  --purple:#833ab4;--orange:#fd1d1d;--yellow:#fcb045;
  --green:#22c55e;--green-bg:rgba(34,197,94,0.12);
  --red:#ef4444;--red-bg:rgba(239,68,68,0.12);
  --blue:#3b82f6;--blue-bg:rgba(59,130,246,0.12);
  --amber:#f59e0b;--amber-bg:rgba(245,158,11,0.12);
  --r:8px;--rl:14px;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);font-size:13px;min-height:100vh;display:flex;flex-direction:column}

/* ── TOP NAV ── */
.topnav{height:54px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:16px;flex-shrink:0}
.brand{display:flex;align-items:center;gap:10px}
.brand-icon{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--purple),var(--pink),var(--orange),var(--yellow));display:flex;align-items:center;justify-content:center}
.brand-icon i{font-size:18px;color:#fff}
.brand-name{font-size:15px;font-weight:700;background:linear-gradient(135deg,var(--purple),var(--pink),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.topnav-spacer{flex:1}
.conn-pill{display:flex;align-items:center;gap:7px;padding:6px 14px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid var(--border2);color:var(--text2);background:var(--bg3)}
.conn-pill.ok{border-color:rgba(34,197,94,0.4);color:var(--green);background:var(--green-bg)}
.conn-pill .dot{width:7px;height:7px;border-radius:50%;background:currentColor}
.topnav-btn{padding:7px 16px;border-radius:20px;border:1px solid var(--border2);background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;font-family:inherit;transition:opacity .15s}
.topnav-btn:hover{opacity:.85}

/* ── LAYOUT ── */
.shell{display:flex;flex:1;overflow:hidden;height:calc(100vh - 54px)}

/* ── SIDEBAR ── */
.sidebar{width:210px;min-width:210px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sidebar-acct{padding:14px 14px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.acct-avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--pink));display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0}
.acct-name{font-size:13px;font-weight:600;line-height:1.3}
.acct-handle{font-size:11px;color:var(--text3)}
.sidebar-sec{padding:14px 14px 5px;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 12px;margin:1px 6px;border-radius:var(--r);cursor:pointer;color:var(--text2);transition:all .12s;font-size:13px}
.nav-item:hover{background:var(--bg3);color:var(--text)}
.nav-item.active{background:var(--pink-glow);color:var(--pink);font-weight:600}
.nav-item i{font-size:16px;flex-shrink:0}
.nav-badge{margin-left:auto;font-size:10px;background:var(--red-bg);color:var(--red);border-radius:10px;padding:2px 7px;font-weight:700}
.nav-badge.new{background:var(--pink-glow);color:var(--pink)}
.nav-badge.ok{background:var(--green-bg);color:var(--green)}
.sidebar-footer{margin-top:auto;padding:12px;border-top:1px solid var(--border)}

/* ── MAIN ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}

/* ── TOOLBAR ── */
.tbar{display:flex;align-items:center;gap:8px;padding:10px 18px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0;flex-wrap:wrap}
.tbar-title{font-size:14px;font-weight:700;flex:1}
.tbar input{font-size:12px;padding:7px 12px;border-radius:20px;border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-family:inherit;outline:none}
.tbar input:focus{border-color:var(--pink)}
select{font-size:12px;padding:7px 10px;border-radius:var(--r);border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-family:inherit}

/* ── BUTTONS ── */
.btn{font-size:12px;padding:7px 14px;border-radius:var(--r);border:1px solid var(--border2);background:var(--bg3);color:var(--text);cursor:pointer;display:inline-flex;align-items:center;gap:6px;font-family:inherit;font-weight:500;transition:all .12s;white-space:nowrap}
.btn:hover{background:var(--bg4);border-color:var(--border2)}
.btn:disabled{opacity:.4;cursor:not-allowed}
.btn i{font-size:14px}
.btn-grad{background:linear-gradient(135deg,var(--purple),var(--pink));border:none;color:#fff;font-weight:600}
.btn-grad:hover{opacity:.85;background:linear-gradient(135deg,var(--purple),var(--pink))}
.btn-green{background:var(--green-bg);border-color:rgba(34,197,94,0.3);color:var(--green)}
.btn-green:hover{background:rgba(34,197,94,0.2)}
.btn-red{background:var(--red-bg);border-color:rgba(239,68,68,.3);color:var(--red)}
.btn-amber{background:var(--amber-bg);border-color:rgba(245,158,11,.3);color:var(--amber)}

/* ── TAGS ── */
.tag{font-size:10px;padding:3px 8px;border-radius:10px;font-weight:600;white-space:nowrap}
.tag-price{background:var(--amber-bg);color:var(--amber)}
.tag-stock{background:var(--blue-bg);color:var(--blue)}
.tag-order{background:var(--green-bg);color:var(--green)}
.tag-collab{background:rgba(139,92,246,.15);color:#a78bfa}
.tag-complaint{background:var(--red-bg);color:var(--red)}
.tag-spam{background:rgba(100,100,100,.15);color:var(--text3)}
.tag-general{background:var(--pink-glow);color:var(--pink)}

/* ── CARDS ── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:16px}
.card h3{font-size:13px;font-weight:700;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.card h3 i{color:var(--pink);font-size:16px}
.card p{font-size:12px;color:var(--text2);line-height:1.7;margin-bottom:10px}

/* ── SETUP WIZARD ── */
.setup-shell{display:flex;flex:1;overflow:hidden}
.setup-steps{width:180px;min-width:180px;border-right:1px solid var(--border);padding:16px 8px;display:flex;flex-direction:column;gap:2px;background:var(--bg2)}
.step-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:var(--r);cursor:pointer;transition:background .12s}
.step-item:hover{background:var(--bg3)}
.step-item.active{background:var(--bg3)}
.step-num{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;transition:all .2s}
.step-num.done{background:var(--green);color:#fff}
.step-num.active{background:var(--pink);color:#fff}
.step-num.idle{background:var(--bg4);color:var(--text3)}
.step-label{font-size:12px;font-weight:500;color:var(--text2)}
.step-item.active .step-label{color:var(--text);font-weight:600}
.setup-content{flex:1;overflow-y:auto;padding:24px 28px}
.setup-content h2{font-size:18px;font-weight:700;margin-bottom:6px}
.setup-content .sub{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:20px}
.step-instruction{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)}
.step-instruction:last-of-type{border-bottom:none}
.step-n{width:22px;height:22px;border-radius:50%;background:var(--bg4);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--text2);flex-shrink:0;margin-top:2px}
.step-text{font-size:13px;color:var(--text);line-height:1.6}
.perm-row{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:var(--bg3);border-radius:var(--r);margin-bottom:5px;font-size:12px}
.perm-name{color:var(--text);font-family:monospace;font-size:11px}
.copy-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:13px;padding:2px 6px;border-radius:5px;transition:color .12s}
.copy-btn:hover{color:var(--pink)}
.tip-box{background:var(--amber-bg);border:1px solid rgba(245,158,11,.2);border-radius:var(--r);padding:10px 13px;font-size:12px;color:var(--amber);line-height:1.6;display:flex;gap:8px;margin:14px 0}
.link-row{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0}
.field-label{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:.05em}
.input-field{width:100%;font-size:13px;padding:9px 12px;border-radius:var(--r);border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-family:inherit;outline:none;transition:border-color .15s}
.input-field:focus{border-color:var(--pink)}
.input-wrap{position:relative;margin-bottom:12px}
.input-wrap .eye-btn{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text3);font-size:16px}
.conn-result{padding:10px 13px;border-radius:var(--r);font-size:12px;font-weight:500;display:flex;align-items:center;gap:8px;margin-top:10px}
.conn-result.ok{background:var(--green-bg);color:var(--green);border:1px solid rgba(34,197,94,.2)}
.conn-result.err{background:var(--red-bg);color:var(--red);border:1px solid rgba(239,68,68,.2)}

/* ── DMs ── */
.dm-shell{display:flex;flex:1;overflow:hidden}
.dm-list{flex:1;overflow-y:auto;min-width:0}
.msg-item{display:flex;gap:10px;padding:11px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.msg-item:hover{background:var(--bg2)}
.msg-item.active{background:rgba(225,48,108,.06);border-left:2px solid var(--pink)}
.msg-item.unread .msg-sender{font-weight:700}
.avatar{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0}
.unread-dot{width:8px;height:8px;border-radius:50%;background:var(--pink);flex-shrink:0;margin-top:13px}
.read-spc{width:8px;flex-shrink:0}
.msg-body{flex:1;min-width:0}
.msg-row1{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}
.msg-sender{font-size:13px}
.msg-time{font-size:11px;color:var(--text3)}
.msg-preview{font-size:12px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px}
.msg-tags{display:flex;gap:4px;flex-wrap:wrap}

/* ── DETAIL ── */
.detail{width:320px;min-width:320px;border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;background:var(--bg2)}
.detail-hdr{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.thread{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:8px}
.bubble{max-width:82%;padding:8px 12px;font-size:13px;line-height:1.5;border-radius:16px}
.bubble.them{background:var(--bg3);align-self:flex-start;border-bottom-left-radius:4px}
.bubble.us{background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.bubble-time{font-size:10px;color:var(--text3);margin-top:3px}
.reply-area{padding:12px 14px;border-top:1px solid var(--border);background:var(--bg)}
.reply-lbl{font-size:10px;font-weight:700;color:var(--text3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;display:flex;align-items:center;gap:5px}
.reply-lbl i{color:var(--pink)}
.draft-text{width:100%;font-size:12px;padding:8px 11px;border-radius:var(--r);border:1px solid var(--border2);background:var(--bg3);color:var(--text);resize:none;line-height:1.5;font-family:inherit;outline:none}
.draft-text:focus{border-color:var(--pink)}

/* ── BULK ── */
.bulk-shell{display:flex;flex:1;overflow:hidden}
.bulk-left{width:55%;min-width:0;display:flex;flex-direction:column;border-right:1px solid var(--border);overflow:hidden}
.bulk-right{flex:1;display:flex;flex-direction:column;overflow-y:auto;background:var(--bg2)}
.sec-hdr{padding:11px 16px;border-bottom:1px solid var(--border);font-size:12px;font-weight:700;color:var(--text2);display:flex;align-items:center;gap:8px;background:var(--bg2);flex-shrink:0}
.tpl-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px;overflow-y:auto}
.tpl-card{border:1px solid var(--border);border-radius:var(--rl);padding:12px;cursor:pointer;transition:all .15s;background:var(--bg2);position:relative}
.tpl-card:hover{border-color:var(--border2);background:var(--bg3)}
.tpl-card.sel{border:2px solid var(--pink);background:var(--pink-glow)}
.tpl-emoji{font-size:24px;margin-bottom:6px}
.tpl-name{font-size:12px;font-weight:700;margin-bottom:2px}
.tpl-desc{font-size:11px;color:var(--text2);line-height:1.4}
.tpl-badge{position:absolute;top:8px;right:8px;font-size:9px;padding:2px 7px;border-radius:10px;font-weight:700}
.tpl-badge.new{background:var(--pink-glow);color:var(--pink)}
.tpl-badge.sale{background:var(--amber-bg);color:var(--amber)}
.comp-area{padding:14px 16px;display:flex;flex-direction:column;gap:11px}
.var-pills{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:5px}
.var-pill{font-size:11px;padding:3px 9px;border-radius:10px;background:var(--blue-bg);color:var(--blue);cursor:pointer;border:1px solid rgba(59,130,246,.2);font-weight:600}
.var-pill:hover{background:rgba(59,130,246,.25)}
.preview-bubble{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--rl);padding:12px;font-size:12px;line-height:1.7;color:var(--text);white-space:pre-wrap;min-height:60px}
.aud-row{display:flex;align-items:center;gap:10px;padding:9px 11px;border-radius:var(--r);border:1px solid var(--border);cursor:pointer;transition:all .12s;background:var(--bg)}
.aud-row:hover{background:var(--bg3)}
.aud-row.chk{background:var(--pink-glow);border-color:rgba(225,48,108,.3)}
.aud-row input[type=checkbox]{accent-color:var(--pink);width:14px;height:14px;flex-shrink:0}
.aud-info{flex:1;min-width:0}
.aud-name{font-size:12px;font-weight:600}
.aud-meta{font-size:11px;color:var(--text2)}
.aud-count{font-size:14px;font-weight:700;color:var(--pink)}
.prog-wrap{height:5px;background:var(--bg4);border-radius:3px;overflow:hidden;margin:4px 0}
.prog-bar{height:100%;background:linear-gradient(90deg,var(--purple),var(--pink));border-radius:3px;transition:width .3s}
.schedule-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.schedule-row label{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:6px;cursor:pointer}
.schedule-row input[type=checkbox]{accent-color:var(--pink)}
.schedule-row input[type=datetime-local]{font-size:12px;padding:6px 10px;border-radius:var(--r);border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-family:inherit}

/* ── QUEUE ── */
.q-item{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:var(--r);border:1px solid var(--border);background:var(--bg2);margin-bottom:7px}
.qs{font-size:10px;padding:3px 9px;border-radius:10px;font-weight:700;flex-shrink:0}
.qs-pending{background:var(--amber-bg);color:var(--amber)}
.qs-sent{background:var(--green-bg);color:var(--green)}
.qs-failed{background:var(--red-bg);color:var(--red)}
.qs-scheduled{background:var(--blue-bg);color:var(--blue)}

/* ── CATALOG ── */
.cat-item{display:flex;gap:12px;align-items:flex-start;padding:13px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);margin-bottom:8px}
.cat-thumb{width:46px;height:46px;border-radius:var(--r);background:var(--bg3);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cat-thumb i{font-size:20px;color:var(--text3)}
.cat-name{font-size:13px;font-weight:700;margin-bottom:2px}
.cat-price{font-size:12px;color:var(--green);font-weight:600}
.cat-stock{font-size:11px;color:var(--text3);margin-top:2px}

/* ── STATS ── */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;padding:16px}
.stat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:14px}
.stat-label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.stat-val{font-size:28px;font-weight:700}
.stat-sub{font-size:11px;color:var(--text3);margin-top:2px}

/* ── EMPTY / LOADING ── */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--text3);font-size:13px;padding:60px 20px;flex:1;text-align:center}
.empty i{font-size:40px;opacity:.4}
.spinner{width:16px;height:16px;border:2px solid var(--border2);border-top-color:var(--pink);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:-4px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── LOG BAR ── */
.log-bar{border-top:1px solid var(--border);padding:5px 18px;background:var(--bg2);max-height:70px;overflow-y:auto;flex-shrink:0}
.log-row{font-size:11px;color:var(--text2);display:flex;gap:8px;padding:1px 0;font-family:monospace}
.log-t{color:var(--text3);flex-shrink:0}
.log-ok{color:var(--green)}.log-err{color:var(--red)}.log-warn{color:var(--amber)}

/* ── WELCOME HERO ── */
.hero{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;text-align:center;gap:0}
.hero-icon{width:72px;height:72px;border-radius:20px;background:linear-gradient(135deg,var(--purple),var(--pink),var(--orange));display:flex;align-items:center;justify-content:center;margin:0 auto 20px}
.hero-icon i{font-size:36px;color:#fff}
.hero h1{font-size:26px;font-weight:800;margin-bottom:10px;background:linear-gradient(135deg,var(--purple),var(--pink),var(--orange));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero p{font-size:14px;color:var(--text2);line-height:1.7;max-width:420px;margin:0 auto 28px}
.feat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;max-width:460px;margin:0 auto 28px;text-align:left}
.feat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--rl);padding:12px 14px;display:flex;gap:10px;align-items:flex-start}
.feat-card i{font-size:18px;color:var(--pink);margin-top:1px;flex-shrink:0}
.feat-title{font-size:12px;font-weight:700;margin-bottom:2px}
.feat-desc{font-size:11px;color:var(--text2);line-height:1.5}

/* ── COMMENTS ── */
.cmt-item{padding:13px 18px;border-bottom:1px solid var(--border)}
.cmt-hdr{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap}
.cmt-user{font-size:12px;font-weight:700}
.cmt-post{font-size:11px;color:var(--text3)}
.cmt-body{font-size:13px;color:var(--text);line-height:1.5;margin-bottom:8px}
.cmt-reply{flex:1;font-size:12px;padding:6px 10px;border-radius:var(--r);border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-family:inherit;outline:none}
.cmt-reply:focus{border-color:var(--pink)}
</style>
</head>
<body>

<nav class="topnav">
  <div class="brand">
    <div class="brand-icon"><i class="ti ti-brand-instagram"></i></div>
    <span class="brand-name">Page Manager</span>
  </div>
  <div class="topnav-spacer"></div>
  <div id="connPill" class="conn-pill"><div class="dot"></div> Not connected</div>
  <button class="topnav-btn" onclick="showTab('settings')" style="margin-left:10px"><i class="ti ti-plug" style="font-size:14px"></i> Connect</button>
</nav>

<div class="shell">
  <nav class="sidebar">
    <div class="sidebar-acct" id="sideAcct" style="display:none">
      <div class="acct-avatar" id="sideAvatarEl">PM</div>
